services:
  - type: web
    name: app-store-backend
    env: docker
    plan: free
    region: singapore # Using a region near India as requested by bombay context in vercel.json
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: app-store-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: CLOUDINARY_CLOUD_NAME
        value: deii8hxll
      - key: CLOUDINARY_API_KEY
        value: "976199473967583"
      - key: CLOUDINARY_API_SECRET
        value: hmjlrH1hSjKTOHQw4r5TElfdUNE

databases:
  - name: app-store-db
    plan: free
    region: singapore
